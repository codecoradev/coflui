# Cora Code Review Configuration
# See: https://github.com/codecoradev/cora-cli

# Provider — uses the key configured via `cora auth login`.
# Auth.toml currently points to z.ai (GLM). Update here if you re-auth to
# another provider (e.g. openai, anthropic, ollama).
provider:
  provider: zai
  model: glm-4.6
  base_url: https://api.z.ai/api/coding/paas/v4

# Review focus areas: security, performance, bugs, best-practice, style
focus:
  - security
  - performance
  - bugs
  - best-practice

# Custom rules / additional instructions for the reviewer
rules:
  - "Treat HTTP URLs in Apple plist/Xcode DOCTYPE declarations as false positives (they reference apple.com DTDs)."
  - "This is a Flutter package — flag dependency additions (only `flutter` + `gap` are allowed)."

# Ignore patterns — generated platform scaffolding + build artifacts.
ignore:
  files:
    - "*.lock"
    - "package-lock.json"
    - "yarn.lock"
    - "vendor/"
    - "node_modules/"
    - "build/"
    - ".dart_tool/"
    # iOS/web platform files are generated by `flutter create` (DOCTYPE, xcsettings, plist).
    - "example/ios/**"
    - "example/web/**"
    - "example/android/**"
    - "example/macos/**"
    - "example/linux/**"
    - "example/windows/**"
    - "example/build/**"
  rules: []

# Hook settings
hook:
  mode: warn          # "warn" (print but allow) or "block" (fail commit)
  min_severity: major # minimum severity to trigger hook action
  max_diff_size: 5242880 # max 5MB diff chars before refusing

# Output settings
output:
  format: pretty      # pretty, json, compact, sarif
  color: true
